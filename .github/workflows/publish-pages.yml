name: Publish Skills Registry Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: skills-registry-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build changelog
        uses: skillcraft-gg/docs/.github/actions/build-changelog@main

      - name: Prepare Pages artifact
        uses: skillcraft-gg/docs/.github/actions/prepare-repo-pages@main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  dispatch-site-rebuild:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ needs.deploy.result == 'success' }}

    steps:
      - name: Create org dispatch app token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.ORG_DISPATCH_APP_ID }}
          private-key: ${{ secrets.ORG_DISPATCH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch Skillcraft Pages publish
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: >
          gh workflow run publish.yml
          --repo skillcraft-gg/skillcraft-gg.github.io
          --ref main
          -f reason=skills-registry-pages
          -f source_repo=${{ github.repository }}
